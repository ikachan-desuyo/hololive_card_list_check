<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホロライブTCG バトルシミュレーター v2</title>
  <link rel="stylesheet" href="battle_simulator_v2/css/board.css">
</head>
<body>
  <div id="app">

    <!-- デッキ選択画面 -->
    <div id="setup-screen">
      <h1>⚔️ バトルシミュレーター v2</h1>
      <label for="deck-p1">プレイヤー1 のデッキ</label>
      <select id="deck-p1"></select>
      <label for="deck-p2">プレイヤー2 のデッキ</label>
      <select id="deck-p2"></select>
      <label for="seed-input">シード値（空欄でランダム / 同じ値で同じ展開を再現）</label>
      <input id="seed-input" type="number" placeholder="例: 42">
      <button id="start-button">ゲーム開始</button>
      <div id="setup-error"></div>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-screen">
      <div class="scene">
        <div class="table">
          <div class="side opponent" id="side-opponent"></div>
          <div class="side player" id="side-player"></div>
        </div>
      </div>

      <div id="opp-hand"></div>
      <div id="hand"></div>

      <!-- 設定ボタン（フィールド右上）と設定パネル -->
      <button id="settings-button" title="設定">⚙</button>
      <div id="settings-panel">
        <div class="settings-title">設定</div>
        <div class="settings-section">
          <div class="settings-label">ステップ送り</div>
          <div class="settings-row" id="pause-speed-buttons">
            <button data-speed="fast">速い</button>
            <button data-speed="normal">普通</button>
            <button data-speed="slow">ゆっくり</button>
            <button data-speed="manual">手動</button>
          </div>
        </div>
        <div class="settings-section">
          <button id="copy-log-button" class="settings-action">📋 ログをコピー</button>
          <button id="concede-p1-button" class="settings-action">🏳 プレイヤー1が投了</button>
          <button id="concede-p2-button" class="settings-action">🏳 プレイヤー2が投了</button>
          <button id="reset-game-button" class="settings-action danger">🔄 ゲームをリセット</button>
        </div>
        <div class="settings-section">
          <div class="settings-note" id="seed-display"></div>
          <div class="settings-note">（同じシード値とデッキで同じ展開を再現できます）</div>
        </div>
      </div>

      <div id="side-panel">
        <div id="status"></div>
        <div id="actions"></div>
        <div id="log"></div>
      </div>

      <div id="card-preview">
        <img src="" alt="">
        <div class="preview-name"></div>
      </div>

      <!-- カード詳細 / アーカイブ一覧モーダル -->
      <div id="inspector-modal">
        <div id="inspector-content">
          <div id="inspector-header">
            <span id="inspector-title"></span>
            <button id="inspector-close">×</button>
          </div>
          <div id="inspector-body"></div>
        </div>
      </div>

      <!-- 複数選択ポップアップ（アーツ選択など） -->
      <div id="chooser"></div>

      <!-- カード効果のカード選択モーダル（デッキサーチ等） -->
      <div id="choice-modal">
        <div id="choice-content">
          <div id="choice-title"></div>
          <div id="choice-grid"></div>
          <div id="choice-footer"></div>
        </div>
      </div>

      <!-- ターン切り替え通知 -->
      <div id="turn-toast"></div>

      <!-- ステップ切り替え通知 + 進行バー -->
      <div id="step-toast"></div>
      <div id="step-bar"></div>

      <div id="result-overlay">
        <div id="result-message"></div>
        <button id="restart-button">もう一度</button>
      </div>
    </div>

  </div>

  <script type="module" src="battle_simulator_v2/ui/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CPU自己対戦ハーネス</title>
</head>
<body>
  <h1>🤖 CPU自己対戦（AI改善ループ計測）</h1>
  <pre id="out"></pre>
  <script>
    // ヘッドレスEdge(--dump-dom)で確実に回収するため、console出力をDOMにも反映する（計測ハーネス専用）。
    (function mirrorConsole() {
      const out = document.getElementById('out');
      const orig = { log: console.log.bind(console), error: console.error.bind(console) };
      const append = (args) => { out.textContent += args.map((a) => (typeof a === 'string' ? a : String(a))).join(' ') + '\n'; };
      console.log = (...a) => { orig.log(...a); append(a); };
      console.error = (...a) => { orig.error(...a); append(a); };
    })();
  </script>
  <script type="module">
    import { runSelfplay } from './selfplay.js';
    runSelfplay().then(() => {
      console.log('SELFPLAY-DONE-MARKER');
      document.title = 'SELFPLAY-DONE';
    }).catch((e) => {
      console.error('SELFPLAY FAILED', e.message);
      document.title = 'SELFPLAY-FAILED';
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CPU自己対戦ハーネス</title>
</head>
<body>
  <h1>🤖 CPU自己対戦（AI改善ループ計測）</h1>
  <pre id="out">実行中...</pre>
  <script type="module">
    import { runSelfplay } from './selfplay.js';
    runSelfplay().then(() => {
      document.getElementById('out').textContent = '完了';

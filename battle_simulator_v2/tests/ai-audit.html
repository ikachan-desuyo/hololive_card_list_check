<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI決定監査ハーネス</title>
</head>
<body>
  <h1>🔍 AI決定監査（CPUの各決定を審判AIで再評価）</h1>
  <pre id="out"></pre>
  <script>
    // ヘッドレスEdge(--dump-dom)で確実に回収するため、console出力をDOMにも反映する（計測ハーネス専用）。
    (function mirrorConsole() {
      const out = document.getElementById('out');
      const orig = { log: console.log.bind(console), error: console.error.bind(console) };
      const append = (args) => { out.textContent += args.map((a) => (typeof a === 'string' ? a : String(a))).join(' ') + '\n'; };
      console.log = (...a) => { orig.log(...a); append(a); };
      console.error = (...a) => { orig.error(...a); append(a); };
    })();
  </script>
  <script type="module">
    import { runAiAudit } from './ai-audit.js';
    runAiAudit().then(() => {
      console.log('AIAUDIT DONE');
      document.title = 'AIAUDIT-DONE';
    }).catch((e) => {
      console.error('AIAUDIT FAILED', e.message, e.stack);
      document.title = 'AIAUDIT-FAILED';
    });
  </script>
</body>
</html>
